{% block head %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PathFinder AI</title>

    <style>

    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: var(--bg);
        color: var(--text);
        transition: 0.3s;
    }

    :root {
        --bg: #ffffff;
        --text: #111;
        --card: rgba(255,255,255,0.7);
    }

    body.dark {
        --bg: #0f172a;
        --text: #f1f5f9;
        --card: rgba(30,41,59,0.7);
    }

    /* NAVBAR */
    .navbar {
        display: flex;
        justify-content: space-between;
        padding: 15px 25px;
        backdrop-filter: blur(10px);
        background: var(--card);
        position: sticky;
        top: 0;
        z-index: 100;
    }

    .logo {
        font-weight: bold;
        font-size: 1.2rem;
    }

    .nav-links a {
        margin-left: 15px;
        text-decoration: none;
        color: var(--text);
    }

    .toggle {
        cursor: pointer;
        margin-left: 15px;
    }

    </style>
</head>

<body>

<div class="navbar">
    <div class="logo">🚀 PathFinder AI</div>

    <div class="nav-links">
        <a href="/">Home</a>

        {% if session.user %}
        <a href="/dashboard">Dashboard</a>
        <a href="/logout">Logout</a>
        {% else %}
        <a href="/login">Login</a>
        <a href="/register">Register</a>
        {% endif %}

        <span class="toggle" onclick="toggleDark()">🌙</span>
    </div>
</div>

<script>
function toggleDark() {
    document.body.classList.toggle("dark");
}
</script>

{% endblock %}
