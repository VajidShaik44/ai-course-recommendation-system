<!DOCTYPE html>
<html>
<head>
    <title>Course Recommendation</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" href="https://img.icons8.com/color/48/000000/book.png">
    <style>
        body {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.9) 0%, rgba(118, 75, 162, 0.9) 100%),
                        url('https://images.unsplash.com/photo-1523050854058-8df90110c9f1?ixlib=rb-1.2.1&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
    </style>
</head>
<body>
<nav>
    <span class="logo">Intelligent Course Recommendation System</span>
    <a href="/">Home</a>
    <a href="/dashboard">Dashboard</a>
    {% if session.is_admin %}
    <a href="/admin">Admin</a>
    {% endif %}
    <a href="/logout">Logout</a>
</nav>

<div class="container">
{% block content %}{% endblock %}
</div>
</body>
</html>
