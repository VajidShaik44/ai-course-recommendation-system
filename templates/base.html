<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}PathFinder AI{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0A0A0F;
      --surface: #111118;
      --surface2: #16161F;
      --border: #1E1E2E;
      --primary: #6C63FF;
      --primary-glow: rgba(108,99,255,0.15);
      --accent: #00D4AA;
      --accent-glow: rgba(0,212,170,0.12);
      --text: #F0F0FF;
      --muted: #8888AA;
      --success: #22C55E;
      --warning: #F59E0B;
      --danger: #EF4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; line-height: 1.6; }
    a { text-decoration: none; }

    .nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 40px; border-bottom: 1px solid var(--border);
      background: rgba(10,10,15,0.9); backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 100;
    }
    .nav-brand { font-size: 18px; font-weight: 800; color: var(--primary); letter-spacing: -0.3px; }
    .nav-brand span { color: var(--accent); }
    .nav-links { display: flex; align-items: center; gap: 6px; }
    .nav-link { color: var(--muted); padding: 8px 16px; border-radius: 8px; font-size: 14px; font-weight: 500; transition: all 0.2s; }
    .nav-link:hover { color: var(--text); background: var(--surface); }
    .btn-nav { background: var(--primary); color: white; padding: 8px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; transition: opacity 0.2s; }
    .btn-nav:hover { opacity: 0.85; }

    .glass-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 24px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .glass-card:hover { border-color: rgba(108,99,255,0.4); box-shadow: 0 0 24px var(--primary-glow); }

    .btn-primary {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      background: var(--primary); color: white; border: none;
      padding: 13px 28px; border-radius: 10px; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: all 0.2s; font-family: inherit;
    }
    .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); box-shadow: 0 8px 20px var(--primary-glow); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-secondary {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      background: transparent; color: var(--text); border: 1px solid var(--border);
      padding: 13px 28px; border-radius: 10px; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: all 0.2s; font-family: inherit;
    }
    .btn-secondary:hover { border-color: var(--primary); background: var(--primary-glow); }

    input, select, textarea {
      background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      padding: 13px 16px; border-radius: 10px; font-size: 14px; font-family: inherit;
      width: 100%; transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus, select:focus, textarea:focus {
      outline: none; border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-glow);
    }
    input::placeholder, textarea::placeholder { color: var(--muted); }
    select option { background: var(--surface2); }
    label { display: block; font-size: 13px; font-weight: 600; color: var(--muted); margin-bottom: 8px; letter-spacing: 0.3px; text-transform: uppercase; }

    .match-badge { padding: 5px 13px; border-radius: 20px; font-size: 12px; font-weight: 700; display: inline-block; }
    .badge-high { background: rgba(34,197,94,0.12); color: var(--success); border: 1px solid rgba(34,197,94,0.25); }
    .badge-mid  { background: rgba(245,158,11,0.12); color: var(--warning); border: 1px solid rgba(245,158,11,0.25); }
    .badge-low  { background: rgba(239,68,68,0.12);  color: var(--danger);  border: 1px solid rgba(239,68,68,0.25); }
    .badge-accent { background: var(--accent-glow); color: var(--accent); border: 1px solid rgba(0,212,170,0.25); }

    .skill-chip {
      display: inline-flex; align-items: center; padding: 8px 16px; border-radius: 20px;
      border: 1px solid var(--border); font-size: 13px; font-weight: 500; cursor: pointer;
      transition: all 0.15s; color: var(--muted); background: var(--surface2); user-select: none;
    }
    .skill-chip:hover { border-color: var(--primary); color: var(--text); }
    .skill-chip.selected { border-color: var(--primary); background: var(--primary-glow); color: var(--text); }

    @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulseDot { 0%,100%{opacity:1} 50%{opacity:0.2} }
    .fade-up { animation: fadeUp 0.4s ease both; }
    .fade-in { animation: fadeIn 0.3s ease both; }
    .spinner { width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.2); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; }
    .dot { display:inline-block; animation: pulseDot 1.2s infinite; }
    .dot:nth-child(2){animation-delay:.2s} .dot:nth-child(3){animation-delay:.4s}

    .page-container { max-width: 1100px; margin: 0 auto; padding: 48px 24px; }
    .section-label { font-size: 12px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 12px; }
    .gradient-text { background: linear-gradient(135deg, #6C63FF, #00D4AA); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .divider { height: 1px; background: var(--border); margin: 40px 0; }

    .flash-error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: var(--danger); padding: 14px 18px; border-radius: 10px; margin-bottom: 20px; font-size: 14px; }
    .flash-success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: var(--success); padding: 14px 18px; border-radius: 10px; margin-bottom: 20px; font-size: 14px; }

    @media (max-width: 768px) {
      .nav { padding: 14px 16px; }
      .nav-brand { font-size: 16px; }
      .page-container { padding: 24px 16px; }
      .glass-card { padding: 18px; }
    }

    {% block extra_css %}{% endblock %}
  </style>
</head>
<body>

<nav class="nav">
  <a href="/" class="nav-brand">PathFinder <span>AI</span></a>
  <div class="nav-links">
    {% if session.get('user') %}
      <a href="/dashboard" class="nav-link">Dashboard</a>
      <a href="/recommend" class="nav-link">New Analysis</a>
      <a href="/profile" class="nav-link">History</a>
      <a href="/logout" class="nav-link">Logout</a>
    {% else %}
      <a href="/login" class="nav-link">Login</a>
      <a href="/register" class="btn-nav">Get Started</a>
    {% endif %}
  </div>
</nav>

{% block content %}{% endblock %}

</body>
</html>
